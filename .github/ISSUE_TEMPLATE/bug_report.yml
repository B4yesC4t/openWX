name: Bug Report
description: Report a reproducible defect or regression in openWX
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug report. Please include enough detail for someone else to reproduce the problem locally.
  - type: dropdown
    id: package
    attributes:
      label: Affected package
      options:
        - "@openwx/core"
        - "@openwx/bot"
        - "@openwx/hub"
        - "@openwx/connector-echo"
        - "@openwx/connector-http-proxy"
        - "@openwx/connector-claude-code"
        - "examples / docs"
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: Which package version or git commit are you using?
      placeholder: 0.1.0 or commit SHA
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: "20.12.0"
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Install ...
        2. Start bot ...
        3. Send message ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or screenshots
      render: shell
