name: Feature Request
description: Propose a new capability, API, or documentation improvement
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Describe the problem first, then the proposed solution. Focus on user impact and API shape.
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      placeholder: What is missing or painful today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      placeholder: What should openWX add or change?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      placeholder: Other approaches, workarounds, or prior art
  - type: dropdown
    id: scope
    attributes:
      label: Relevant area
      options:
        - core protocol client
        - bot lifecycle
        - hub routing
        - connectors
        - examples
        - documentation
    validations:
      required: true
  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I checked existing issues and documentation first
          required: true
        - label: This request does not disclose a security vulnerability
          required: true
